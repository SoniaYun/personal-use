<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计量证书查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #f5f5f5;
        }
        .header {
            background-color: #348eda;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: 500;
        }
        .back-btn {
            position: absolute;
            left: 15px;
            color: white;
            text-decoration: none;
            font-size: 16px;
        }
        .container {
            padding: 20px;
        }
        .show-btn {
            width: 100%;
            background-color: #348eda;
            color: white;
            border: none;
            padding: 18px;
            font-size: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
        }
        .table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 16px;
        }
        .table td:first-child {
            background-color: #a8d4f8;
            width: 30%;
            text-align: center;
            font-weight: 500;
        }
        .table tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="#" class="back-btn">返回</a>
        计量证书查询
    </div>
    <div class="container">
        <button class="show-btn">显示证书内容</button>
        <table class="table">
            <tr>
                <td>证书编号</td>
                <td>CHQ20250828015</td>
            </tr>
            <tr>
                <td>系统单号</td>
                <td>25AA12670</td>
            </tr>
            <tr>
                <td>序号</td>
                <td>0059</td>
            </tr>
            <tr>
                <td>委托单号</td>
                <td>25AA12670</td>
            </tr>
            <tr>
                <td>证书单位</td>
                <td>北京市华北精仪计量检测中心</td>
            </tr>
            <tr>
                <td>校准日期</td>
                <td>20250828</td>
            </tr>
            <tr>
                <td>仪器名称</td>
                <td>测地型GNSS接收机</td>
            </tr>
            <tr>
                <td>型号规格</td>
                <td>S5II</td>
            </tr>
            <tr>
                <td>出厂编号</td>
                <td>S520312100008B</td>
            </tr>
            <tr>
                <td>管理编号</td>
                <td>/</td>
            </tr>
        </table>
    </div>
</body>
</html>
